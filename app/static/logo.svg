<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Shopify-like Green Gradient -->
    <linearGradient id="shopifyGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#96bf48;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5f8e3e;stop-opacity:1" />
    </linearGradient>
    <!-- Document/Export Gradient -->
    <linearGradient id="docGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f3f5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- Main Group with Drop Shadow -->
  <g filter="url(#shadow)">
    <!-- Shopify Bag Body -->
    <path
      d="M376 160H344V124C344 86.4 313.6 56 276 56H236C198.4 56 168 86.4 168 124V160H136C113.9 160 96 177.9 96 200V424C96 446.1 113.9 464 136 464H376C398.1 464 416 446.1 416 424V200C416 177.9 398.1 160 376 160ZM200 124C200 104.1 216.1 88 236 88H276C295.9 88 312 104.1 312 124V160H200V124Z"
      fill="url(#shopifyGreen)" />

    <!-- CSV/Data Document sliding out -->
    <g transform="translate(196, 220)">
      <rect x="0" y="0" width="120" height="150" rx="8" fill="url(#docGradient)" stroke="#e9ecef" stroke-width="2" />
      <!-- Data Lines -->
      <rect x="25" y="30" width="70" height="8" rx="4" fill="#868e96" opacity="0.3" />
      <rect x="25" y="55" width="70" height="8" rx="4" fill="#4361ee" opacity="0.2" />
      <rect x="25" y="80" width="50" height="8" rx="4" fill="#868e96" opacity="0.3" />
      <rect x="25" y="105" width="60" height="8" rx="4" fill="#868e96" opacity="0.3" />

      <!-- CSV Badge -->
      <rect x="75" y="-10" width="45" height="24" rx="4" fill="#20c997" />
      <text x="97" y="6" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white"
        text-anchor="middle">CSV</text>
    </g>

    <!-- Export Arrow Icon (Circular Badge) -->
    <circle cx="356" cy="380" r="50" fill="#ffffff" />
    <circle cx="356" cy="380" r="42" fill="#4361ee" />
    <path d="M356 355V395M336 375L356 355L376 375" stroke="white" stroke-width="8" stroke-linecap="round"
      stroke-linejoin="round" fill="none" />
    <path d="M356 405H356.02" stroke="white" stroke-width="8" stroke-linecap="round" />
  </g>
</svg>